version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
      semver-major-days: 7
    rebase-strategy: disabled
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 7
    rebase-strategy: disabled
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
